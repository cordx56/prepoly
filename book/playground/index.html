<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <title>prepoly Playground</title>
  </head>
  <body>
    <style>
      :root {
        --bg-color: #222224;
        --color: #efefef;
      }
      --bg-color {}
      body, html {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        color: var(--color);
        background: var(--bg-color);
        font-family: sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      #playground {
        display: flex;
        height: 100%;
        padding: 8px;
      }
      #playground * {
        box-sizing: border-box;
      }
      #playground > section {
        width: 50%;
        height: 100%;
        padding: 12px;
      }
      #execButton {
        width: 100%;
        margin: 8px 0;
        padding: 8px;
        font-size: 1.2em;

        color: var(--color);
        background: var(--bg-color);

        border: 1px solid #ccc;
      }
      #program-container {
        width: 100%;
        height: 100%;
        border: 1px solid #ccc;
      }
      #stdout, #stderr {
        margin: 8px 0;
        padding: 12px;
        border: 1px solid #ccc;
        font-size: 1.2em;
        overflow-x: auto;
      }
      #stderr {
        color: #c88;
      }
      #stdout pre, #stderr pre, #stdout code, #stderr code {
        margin: 0;
        padding: 0;
      }
    </style>
    <div id="playground">
      <section>
        <div id="program-container">
        </div>
      </section>
      <section>
        <button id="execButton">Execute</button>
        <h3>stdout</h3>
        <div id="stdout"></div>
        <h3>stderr</h3>
        <div id="stderr"></div>
      </section>
      <script type="module" src="/src/main.ts"></script>
    </div>
  </body>
</html>
