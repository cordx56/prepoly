# The process library's native half: a Brass plugin (cdylib) loaded by
# `libraries/process.cz`. Build and install it with `libraries/build.sh`, which
# places the cdylib next to this manifest as `process.<dll suffix>`.
[package]
name = "brass_lib_process"
description = "Brass plugin: spawn and control OS processes"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true

[lib]
# The cdylib is installed as `libraries/libprocess.so`, and the wrapper
# module imports it by that file name (`import libprocess.{ .. }`).
name = "process"
crate-type = ["cdylib"]
path = "src/lib.rs"

[dependencies]
brass_plugin = { workspace = true }
