name: Make GitHub Draft

on:
  push:
    tags:
      - v*

permissions:
  actions: read
  contents: write

jobs:
  meta:
    name: Check Version
    runs-on: ubuntu-latest
    outputs:
      pre_release: ${{ steps.pre-release.outputs.pre_release }}
      build_channel: ${{ steps.pre-release.outputs.build_channel }}
    steps:
      - name: Check pre-release
        id: pre-release
        run: |
          if [[ "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "pre_release=false" >> $GITHUB_OUTPUT
            echo "build_channel=stable" >> $GITHUB_OUTPUT
          else
            echo "pre_release=true" >> $GITHUB_OUTPUT
            echo "build_channel=beta" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build
    runs-on: ${{ matrix.host }}
    needs: 
      - meta
    strategy:
      matrix:
        host:
          - ubuntu-22.04
          - ubuntu-22.04-arm
          - macos-latest
          - macos-15-intel
    steps:
      - uses: actions/checkout@v7
      - name: Build All
        run: |
          if [[ "$(uname)" == "Darwin" ]]; then
              brew install llvm@22
          fi

          export BUILD_CHANNEL="${{ needs.meta.outputs.build_channel }}"

          ./scripts/pack.sh
      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: prepoly-${{ matrix.host }}
          path: "*.tar.gz"

  github-release:
    name: Create A GitHub Release
    runs-on: ubuntu-latest
    needs: 
      - meta
      - build
    steps:
      - uses: actions/checkout@v7
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Generate Release Notes
        run: |
          npx changelogithub@latest --contributors --output release.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: "prepoly-*"
          merge-multiple: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          files: "artifacts/*"
          draft: true
          body_path: release.md
          prerelease: ${{ needs.meta.outputs.pre_release == 'true' }}
